<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск - Главная</title>
    <style>
        /* Основные настройки и сброс стилей */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #fc0; /* Фирменный желтый цвет */
            --accent-hover: #f5c200;
            --input-bg: #f2f2f2;
            --input-border: #e0e0e0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Верхняя панель (Header) */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
            font-size: 14px;
        }

        header a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 20px;
            transition: opacity 0.2s;
        }

        header a:hover {
            opacity: 0.7;
        }

        /* Основной контент по центру */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Логотип */
        .logo {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -2px;
            user-select: none;
        }

        /* Раскраска букв логотипа для стиля */
        .logo span:nth-child(1) { color: #f00; }
        .logo span:nth-child(2) { color: #fc0; }
        .logo span:nth-child(3) { color: #0c0; }
        .logo span:nth-child(4) { color: #00f; }
        .logo span:nth-child(5) { color: #f00; }
        .logo span:nth-child(6) { color: #333; }

        /* Контейнер поиска */
        .search-container {
            width: 100%;
            max-width: 720px;
            position: relative;
        }

        /* Поисковая строка */
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 12px 20px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .search-bar:hover, .search-bar:focus-within {
            background: #fff;
            border-color: var(--accent-color);
            box-shadow: var(--shadow-hover);
        }

        /* Иконка лупы (SVG) */
        .search-icon {
            width: 24px;
            height: 24px;
            fill: #999;
            margin-right: 15px;
        }

        .search-bar:hover .search-icon {
            fill: #555;
        }

        /* Поле ввода */
        input[type="text"] {
            flex-grow: 1;
            border: none;
            background: transparent;
            font-size: 18px;
            outline: none;
            color: var(--text-color);
        }

        /* Кнопка поиска */
        .search-btn {
            background-color: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 15px;
            transition: background-color 0.2s;
            color: #000;
        }

        .search-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Подвал (Footer) */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #eee;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 600px) {
            .logo { font-size: 48px; }
            header { padding: 15px 20px; }
            .search-btn { padding: 10px 15px; }
            .search-bar { padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <!-- Верхнее меню -->
    <header>
        <a href="#">Почта</a>
        <a href="#">Картинки</a>
        <a href="#">Карты</a>
        <a href="#">Войти</a>
    </header>

    <!-- Основная часть -->
    <main>
        <!-- Логотип -->
        <div class="logo">
            <span>Я</span><span>н</span><span>д</span><span>е</span><span>к</span><span>с</span>
        </div>

        <!-- Форма поиска -->
        <div class="search-container">
            <form action="#" method="GET" onsubmit="event.preventDefault(); alert('Поиск работает!');">
                <div class="search-bar">
                    <!-- SVG иконка лупы -->
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    
                    <input type="text" placeholder="Найдётся всё..." autofocus>
                    
                    <button type="submit" class="search-btn">Найти</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Подвал -->
    <footer>
        &copy; 2023 Дизайн-концепция. Все права защищены.
    </footer>

</body>
</html>
